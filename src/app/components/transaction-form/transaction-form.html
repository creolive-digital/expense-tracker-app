<div class="container">
  <div class="header">
    <a routerLink="/dashboard" class="back-btn">←</a>
    <h2>Add Transaction</h2>
  </div>

  <form [formGroup] = "transactionForm" (ngSubmit) = "onSubmit()" class="card">
    <div class="form-group type-group">
      <label>Type</label>
      <div class="radio-group">
        <input type="radio" id="debit" value="debit" formControlName="type">
        <label for="debit" class="radio-label debit-label">Debit</label>
        
        <input type="radio" id="credit" value="credit" formControlName="type">
        <label for="credit" class="radio-label credit-label">Credit</label>
      </div>
    </div>

    <div class="form-group">
      <label for="amount">Amount</label>
      <input type="number" id="amount" formControlName="amount" placeholder="0.00" step="0.01">
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category" formControlName="category_id">
        <option value="" disabled>Select Category</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" formControlName="date">
    </div>

    <div class="form-group">
      <label for="description">Description (Optional)</label>
      <input type="text" id="description" formControlName="description" placeholder="e.g. Lunch at Joe's">
    </div>

    <button type="submit" class="btn btn-primary btn-block" [disabled]="!transactionForm.valid">
      Save Transaction
    </button>
  </form>
</div>
