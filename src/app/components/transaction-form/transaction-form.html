<div class="container">
  <div class="header-action">
    <a routerLink="/dashboard" class="back-link">←</a>
    <h2>Add Transaction</h2>
  </div>

  <form [formGroup] = "transactionForm" (ngSubmit) = "onSubmit()" class="card glass-form">
    <div class="form-group">
      <label>Transaction Type</label>
      <div class="toggle-group">
        <input type="radio" id="debit" value="debit" formControlName="type">
        <label for="debit" class="toggle-btn debit-btn">Expense</label>
        
        <input type="radio" id="credit" value="credit" formControlName="type">
        <label for="credit" class="toggle-btn credit-btn">Income</label>
      </div>
    </div>

    <div class="form-group">
      <label for="amount">Amount</label>
      <div class="input-wrapper">
        <span class="currency-symbol">$</span>
        <input type="number" id="amount" formControlName="amount" placeholder="0.00" step="0.01">
      </div>
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category" formControlName="category_id">
        <option value="" disabled>Select Category</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" formControlName="date">
    </div>

    <div class="form-group">
      <label for="description">Description (Optional)</label>
      <input type="text" id="description" formControlName="description" placeholder="e.g. Starbucks Coffee">
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="!transactionForm.valid">
      Add Transaction
    </button>
  </form>
</div>
